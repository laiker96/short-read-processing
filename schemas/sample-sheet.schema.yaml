schema_version: 2
name: short-read-processing sample sheet
row_model: One row is one public run or experiment accession. Rows with the same library_id are technical runs of one biological library.
formats:
  - tsv
  - csv
allow_extra_columns: true

required_columns:
  - accession
  - library_id
  - assay
  - context

fields:
  accession:
    type: accession
    pattern: '^(SRR|SRX|ERR|ERX)[0-9]+$'
    description: Public run or experiment accession. Experiment accessions expand to all runs.
  library_id:
    type: string
    pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
    description: Biological library ID. Repeat it to merge technical runs before alignment.
  assay:
    type: enum
    values: [atac, h3k27ac, chip_tf, chip_histone]
    description: Use h3k27ac for histone H3K27ac ChIP-seq; chip_histone remains an accepted alias.
  context:
    type: string
    pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
    description: Tissue, stage, or cell-type ID. Distinct ATAC libraries in one context are biological replicates.
  role:
    type: enum
    values: [treatment, control]
    allow_blank: true
    default: treatment
  control_library:
    type: string
    pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
    allow_blank: true
    description: Optional library_id of the matched ChIP input; blank for IP-only ChIP, ATAC, and control rows.
  peak_caller:
    type: enum
    values: [hmmratac, callpeak]
    allow_blank: true
    defaults_by_assay:
      atac: callpeak
      chip_tf: callpeak
      chip_histone: callpeak

  macs3_format:
    type: enum
    values: [AUTO, BAM, BAMPE]
    allow_blank: true
    default: AUTO
  macs3_qvalue:
    type: number
    exclusive_minimum: 0
    maximum: 1
    allow_blank: true
    defaults_by_assay:
      atac: 0.10
      chip_tf: 0.01
      chip_histone: 0.01
  macs3_broad:
    type: boolean
    allow_blank: true
    defaults_by_assay:
      atac: false
      chip_tf: false
      chip_histone: true
  macs3_broad_cutoff:
    type: number
    exclusive_minimum: 0
    maximum: 1
    allow_blank: true
    default: 0.1
  macs3_nomodel:
    type: boolean
    allow_blank: true
    defaults_by_assay:
      atac: true
      chip_tf: false
      chip_histone: false
  macs3_shift:
    type: integer
    allow_blank: true
    defaults_by_assay:
      atac: -75
  macs3_extsize:
    type: integer
    minimum: 1
    allow_blank: true
    defaults_by_assay:
      atac: 150

  hmmratac_lower:
    type: number
    minimum: 0
    allow_blank: true
    default: 10
  hmmratac_upper:
    type: number
    minimum: 0
    allow_blank: true
    default: 20
  hmmratac_prescan_cutoff:
    type: number
    minimum: 0
    allow_blank: true
    default: 1.2

  adapter_preset:
    type: enum
    values: [nextera, truseq, custom]
    allow_blank: true
    defaults_by_assay:
      atac: nextera
      chip_tf: truseq
      chip_histone: truseq
  adapter_fasta:
    type: string
    allow_blank: true
  trim_quality_cutoff:
    type: integer
    minimum: 0
    maximum: 50
    allow_blank: true
    default: 20
  trim_minimum_length:
    type: integer
    minimum: 1
    allow_blank: true
    default: 20
  bowtie2_preset:
    type: enum
    values: [sensitive, very-sensitive, sensitive-local, very-sensitive-local]
    allow_blank: true
    default: very-sensitive
  maximum_fragment_length:
    type: integer
    minimum: 1
    allow_blank: true
    default: 2000
  mapq_minimum:
    type: integer
    minimum: 0
    maximum: 255
    allow_blank: true
    default: 30
  remove_duplicates:
    type: boolean
    allow_blank: true
    default: true
  remove_mitochondrial:
    type: boolean
    allow_blank: true
    default: true
  notes:
    type: string
    allow_blank: true

cross_field_rules:
  - Each accession must appear exactly once in the sheet.
  - Rows sharing library_id are technical runs and must have identical context, assay, role, control_library, and processing fields.
  - Distinct ATAC library_id values in one context are biological replicates and are pooled automatically.
  - ATAC rows must have role=treatment and a blank control_library.
  - A nonblank ChIP treatment control_library must name an existing role=control library_id in the same context and assay.
  - ChIP control rows must have a blank control_library.
  - HMMRATAC is valid only for paired-end ATAC after accession resolution.
  - MACS3-only columns must be blank when peak_caller=hmmratac.
  - ATAC callpeak always uses a two-ended Tn5 insertion BED, unscaled MACS3 pileup/local lambda, and qpois refinement.
  - ChIP macs3_shift or macs3_extsize requires macs3_format=BAM and resolves macs3_nomodel=true.
resolved_chip_callpeak_outputs:
  flags: [-B, --SPMR]
  treatment_bedgraph: '{library_id}_treat_pileup.bdg'
  control_bedgraph: '{library_id}_control_lambda.bdg'
